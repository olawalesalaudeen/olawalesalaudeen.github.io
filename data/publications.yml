- id: salaudeen2025aggregation
  title: "Aggregation Hides Out-of-Distribution Generalization Failures from Spurious Correlations"
  authors: "Olawale Salaudeen, Haoran Zhang, Kumail Alhamoud, Sara Beery, Marzyeh Ghassemi"
  venue: "NeurIPS 2025"
  note: "Spotlight"
  year: 2025
  status: published
  featured: true
  tags: [measurement, generalization]
  links:
    paper: "https://arxiv.org/abs/2510.24884"
    blog: "blogs/aggregation.html"
    news: "https://news.mit.edu/2026/why-its-critical-to-move-beyond-overly-aggregated-machine-learning-metrics-0120"
  abstract: >
    Aggregate OOD metrics mask critical failures where models rely on spurious
    correlations. We introduce OODSelect to reveal semantically coherent subsets
    where accuracy-on-the-line breaks down.
  bibtex: |
    @inproceedings{salaudeen2025aggregation,
      title={Aggregation Hides Out-of-Distribution Generalization Failures from Spurious Correlations},
      author={Olawale Elijah Salaudeen and Haoran Zhang and Kumail Alhamoud and Sara Beery and Marzyeh Ghassemi},
      booktitle={Advances in Neural Information Processing Systems},
      year={2025}
    }

