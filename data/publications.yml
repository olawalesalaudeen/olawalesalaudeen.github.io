# ============================================================================
# Publications — Single source of truth
# ============================================================================
# Adding an entry here automatically updates:
#   - Publications page (always)
#   - Homepage research directions (if featured)
#
# File location: data/publications.yml
#
# Fields:
#   id         : unique key (used for anchors)
#   title      : paper title
#   authors    : author string (* = equal contribution, α-β = alphabetical)
#   venue      : journal / conference name
#   note       : optional extra (e.g. "Spotlight", "Oral", "Best Paper")
#   year       : publication year (used for grouping)
#   featured   : true to show on homepage Research Directions
#   tags       : list from [measurement, generalization, intervention, applications]
#   links      : map of label → URL (paper, code, webpage, slides, etc.)
#   abstract   : short description (optional)
#   bibtex     : BibTeX citation string (shown in dropdown)
#   status     : "preprint" or "published" (preprints grouped separately)
#                workshops count as published
# ============================================================================

