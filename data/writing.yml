- title: "Aggregation Hides Out-of-Distribution Generalization Failures from Spurious Correlations"
  date: "2025"
  year: 2025
  summary: >
    By focusing on aggregated performance metrics, standard domain generalization
    benchmarks inadvertently mask critical failures in which models rely on
    spurious correlations, underscoring the need for more granular evaluation to
    ensure true robustness.
