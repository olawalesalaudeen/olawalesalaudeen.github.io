  featured: true
  tags: [measurement, generalization]

- title: "Measurement to Meaning: A Validity-Centered Framework for AI Evaluation"
  date: "2025"
  year: 2025
  summary: >
    AI progress isn't just about better scores, but about understanding what
    those scores mean—turning raw measurements of behavior into real insight
    about what AI systems actually know and can do. This post explores the
    shift from measurement to meaning in how we evaluate AI.
  link: "https://www.olawalesalaudeen.com/blogs"
  featured: true
  tags: [measurement]

- title: "Are Domain Generalization Benchmarks with Accuracy on the Line Misspecified?"
  date: "2025"
  year: 2025
  summary: >
    Domain generalization benchmarks with accuracy on the line aren't testing
    the kinds of challenging shifts we actually care about. This post explores
    how such benchmarks can be misspecified—rewarding stability over true
    robustness and obscuring the harder problems the field aims to solve.
  link: "https://www.olawalesalaudeen.com/blogs"
  featured: false
  tags: [measurement, generalization]

- title: "On Domain Generalization Datasets as Proxy Benchmarks for Causal Representation Learning"
  date: "2024"
  year: 2024
  summary: >
    Not every distribution shift benchmark is a good test of causal
    representation learning? This post argues that while causal representations
    aim for worst-case robustness, many domain generalization datasets capture
    easier kinds of shifts—so using them as proxy benchmarks can misrepresent
    what causal representation learning is really meant to achieve.
  link: "https://www.olawalesalaudeen.com/blogs"
  featured: false
  tags: [measurement, generalization]

